<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="./script.js"></script>
    <title>Administrador de Invitados</title>

    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #0b0b0b;
        color: white;
      }

      header {
        padding: 15px;
        text-align: center;
        font-size: 18px;
        font-weight: bold;
        background: #111;
        position: sticky;
        top: 0;
      }

      .container {
        padding: 15px;
      }

      .card {
        background: #1a1a1a;
        padding: 15px;
        border-radius: 12px;
        margin-bottom: 12px;
      }

      .name {
        font-size: 16px;
        font-weight: bold;
        margin-bottom: 5px;
      }

      .link {
        font-size: 12px;
        color: #aaa;
        word-break: break-all;
        margin-bottom: 10px;
      }

      .buttons {
        display: flex;
        gap: 10px;
      }

      button {
        flex: 1;
        padding: 10px;
        border: none;
        border-radius: 8px;
        font-size: 13px;
        cursor: pointer;
      }

      .copy {
        background: #4caf50;
        color: white;
      }

      .whatsapp {
        background: #25d366;
        color: white;
      }
    </style>
  </head>

  <body>
    <header>🎉 Administrador de Invitaciones</header>

    <div class="container" id="lista">
      <!-- Aquí se generan los invitados -->
    </div>
  </body>
</html>
